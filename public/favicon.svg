<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="heart" x1="20" y1="10" x2="44" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DF9BB0"/>
      <stop offset="0.5" stop-color="#C7798B"/>
      <stop offset="1" stop-color="#D8B26E"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#3B0A18"/>
      <stop offset="1" stop-color="#080607"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="15.25" fill="none" stroke="#D8B26E" stroke-opacity="0.25"/>

  <!-- Coração -->
  <g filter="url(#glow)" transform="translate(5.6 5.6) scale(2.2)">
    <path fill="url(#heart)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    <!-- Brilho suave no topo do coração -->
    <path fill="#FFF7F2" fill-opacity="0.35" d="M7.5 4.4c-1.9 0-3.4 1.5-3.4 3.4 0 .5.1 1 .3 1.5C3.7 8.4 3.4 7.3 3.4 6.3 3.4 4.5 4.9 3 6.7 3c1 0 1.9.4 2.5 1.1-.5-.2-1.1-.3-1.7-.3z"/>
  </g>
</svg>
